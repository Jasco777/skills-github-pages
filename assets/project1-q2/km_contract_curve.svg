<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Kaplan-Meier curves by contract type</title>
  <desc id="desc">Month-to-month contracts have much lower survival than one-year and two-year contracts.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Survival Curves by Contract Type</text>
  <line x1="88" y1="384" x2="760" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="70" x2="88" y2="384" stroke="#374151" stroke-width="2"/>
  <text x="424" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Tenure months</text>
  <text x="24" y="230" transform="rotate(-90 24 230)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Survival probability</text>
  <text x="42" y="78" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">1.00</text>
  <text x="54" y="233" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">0.50</text>
  <line x1="88" y1="227" x2="760" y2="227" stroke="#e5e7eb" stroke-dasharray="6 6"/>
  <polyline fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round" points="88,82 172,116 256,156 340,204 424,250 508,292 592,328 676,354 760,368"/>
  <polyline fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" points="88,80 172,86 256,96 340,112 424,132 508,154 592,176 676,198 760,218"/>
  <polyline fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" points="88,78 172,80 256,84 340,89 424,95 508,103 592,111 676,121 760,132"/>
  <rect x="548" y="82" width="190" height="84" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <line x1="566" y1="106" x2="606" y2="106" stroke="#dc2626" stroke-width="4"/><text x="616" y="111" font-family="Arial, sans-serif" font-size="13" fill="#374151">Month-to-month</text>
  <line x1="566" y1="132" x2="606" y2="132" stroke="#f59e0b" stroke-width="4"/><text x="616" y="137" font-family="Arial, sans-serif" font-size="13" fill="#374151">One year</text>
  <line x1="566" y1="158" x2="606" y2="158" stroke="#16a34a" stroke-width="4"/><text x="616" y="163" font-family="Arial, sans-serif" font-size="13" fill="#374151">Two year</text>
</svg>
