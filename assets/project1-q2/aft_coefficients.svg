<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Log-logistic AFT exponentiated coefficients</title>
  <desc id="desc">Automatic payment, partner status, online security, tech support, and online backup are associated with longer survival time.</desc>
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Log-Logistic AFT Effects</text>
  <line x1="320" y1="470" x2="820" y2="470" stroke="#374151" stroke-width="2"/>
  <line x1="320" y1="70" x2="320" y2="470" stroke="#d1d5db"/>
  <text x="570" y="504" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Exp(coef.), values above 1 imply longer expected survival</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#374151">
    <text x="310" y="98" text-anchor="end">Credit card automatic</text>
    <text x="310" y="143" text-anchor="end">Bank transfer automatic</text>
    <text x="310" y="188" text-anchor="end">partner_Yes</text>
    <text x="310" y="233" text-anchor="end">onlineSecurity_Yes</text>
    <text x="310" y="278" text-anchor="end">techSupport_Yes</text>
    <text x="310" y="323" text-anchor="end">onlineBackup_Yes</text>
    <text x="310" y="368" text-anchor="end">deviceProtection_Yes</text>
    <text x="310" y="413" text-anchor="end">multipleLines_Yes</text>
    <text x="310" y="458" text-anchor="end">internetService_DSL</text>
  </g>
  <rect x="320" y="80" width="425" height="24" fill="#2563eb"/><text x="755" y="98" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">4.25</text>
  <rect x="320" y="125" width="381" height="24" fill="#2563eb"/><text x="711" y="143" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">3.81</text>
  <rect x="320" y="170" width="305" height="24" fill="#2563eb"/><text x="635" y="188" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">3.05</text>
  <rect x="320" y="215" width="244" height="24" fill="#2563eb"/><text x="574" y="233" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">2.44</text>
  <rect x="320" y="260" width="231" height="24" fill="#2563eb"/><text x="561" y="278" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">2.31</text>
  <rect x="320" y="305" width="157" height="24" fill="#2563eb"/><text x="487" y="323" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">1.57</text>
  <rect x="320" y="350" width="127" height="24" fill="#2563eb"/><text x="457" y="368" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">1.27</text>
  <rect x="320" y="395" width="112" height="24" fill="#2563eb"/><text x="442" y="413" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">1.12</text>
  <rect x="320" y="440" width="96" height="24" fill="#9ca3af"/><text x="426" y="458" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">0.96</text>
</svg>
