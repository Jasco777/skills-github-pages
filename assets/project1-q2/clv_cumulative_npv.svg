<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Cumulative net present value for example customer</title>
  <desc id="desc">Cumulative NPV increases from 29.75 at month 1 to 338.51 at month 12 and 1610.39 across the full horizon.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">CLV Payback Curve</text>
  <line x1="88" y1="384" x2="760" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="70" x2="88" y2="384" stroke="#374151" stroke-width="2"/>
  <text x="424" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Month</text>
  <text x="24" y="230" transform="rotate(-90 24 230)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Cumulative NPV</text>
  <text x="50" y="389" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">0</text>
  <text x="38" y="238" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">800</text>
  <text x="30" y="78" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">1600</text>
  <polyline fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="100,378 122,372 144,367 210,350 344,318 760,70"/>
  <circle cx="100" cy="378" r="5" fill="#2563eb"/><text x="108" y="368" font-family="Arial, sans-serif" font-size="12" fill="#1f2937">M1 29.75</text>
  <circle cx="144" cy="367" r="5" fill="#2563eb"/><text x="154" y="360" font-family="Arial, sans-serif" font-size="12" fill="#1f2937">M3 88.39</text>
  <circle cx="210" cy="350" r="5" fill="#2563eb"/><text x="220" y="344" font-family="Arial, sans-serif" font-size="12" fill="#1f2937">M6 174.08</text>
  <circle cx="344" cy="318" r="5" fill="#2563eb"/><text x="354" y="312" font-family="Arial, sans-serif" font-size="12" fill="#1f2937">M12 338.51</text>
  <circle cx="760" cy="70" r="5" fill="#2563eb"/><text x="642" y="66" font-family="Arial, sans-serif" font-size="12" fill="#1f2937">Full horizon 1610.39</text>
</svg>
