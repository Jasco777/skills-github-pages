<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Cox proportional hazards model hazard ratios</title>
  <desc id="desc">Paperless billing increases churn hazard, while tech support, dependents, and online backup lower churn hazard.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Cox Model Hazard Ratios</text>
  <line x1="300" y1="70" x2="300" y2="390" stroke="#d1d5db"/>
  <line x1="88" y1="390" x2="760" y2="390" stroke="#374151" stroke-width="2"/>
  <text x="300" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">1.0 baseline</text>
  <text x="424" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Hazard ratio</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#374151">
    <text x="82" y="104" text-anchor="end">dependents_Yes</text>
    <text x="82" y="164" text-anchor="end">internetService_DSL</text>
    <text x="82" y="224" text-anchor="end">onlineBackup_Yes</text>
    <text x="82" y="284" text-anchor="end">techSupport_Yes</text>
    <text x="82" y="344" text-anchor="end">paperlessBilling_Yes</text>
  </g>
  <rect x="168" y="86" width="94" height="28" fill="#16a34a"/><text x="272" y="106" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">0.44</text>
  <rect x="278" y="146" width="22" height="28" fill="#16a34a"/><text x="310" y="166" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">0.93</text>
  <rect x="188" y="206" width="112" height="28" fill="#16a34a"/><text x="310" y="226" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">0.53</text>
  <rect x="144" y="266" width="156" height="28" fill="#16a34a"/><text x="310" y="286" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">0.39</text>
  <rect x="300" y="326" width="250" height="28" fill="#dc2626"/><text x="560" y="346" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">2.19</text>
</svg>
