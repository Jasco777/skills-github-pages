<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Kaplan-Meier curves by gender</title>
  <desc id="desc">Male and female survival curves are close together, showing a weaker contrast.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Survival Curves by Gender</text>
  <line x1="88" y1="384" x2="760" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="70" x2="88" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="227" x2="760" y2="227" stroke="#e5e7eb" stroke-dasharray="6 6"/>
  <text x="424" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Tenure months</text>
  <text x="24" y="230" transform="rotate(-90 24 230)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Survival probability</text>
  <polyline fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" points="88,82 172,88 256,99 340,116 424,136 508,159 592,183 676,208 760,232"/>
  <polyline fill="none" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" points="88,80 172,87 256,98 340,114 424,134 508,156 592,181 676,206 760,230"/>
  <rect x="566" y="82" width="150" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <line x1="584" y1="106" x2="624" y2="106" stroke="#7c3aed" stroke-width="4"/><text x="634" y="111" font-family="Arial, sans-serif" font-size="13" fill="#374151">Female</text>
  <line x1="584" y1="132" x2="624" y2="132" stroke="#0ea5e9" stroke-width="4"/><text x="634" y="137" font-family="Arial, sans-serif" font-size="13" fill="#374151">Male</text>
</svg>
