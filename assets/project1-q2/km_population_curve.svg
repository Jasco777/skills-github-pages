<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Population-level Kaplan-Meier survival curve</title>
  <desc id="desc">The survival curve remains above 0.5 across the observed tenure range, so median survival is not reached.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Population Kaplan-Meier Survival Curve</text>
  <line x1="88" y1="384" x2="760" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="70" x2="88" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="227" x2="760" y2="227" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6 6"/>
  <text x="54" y="233" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">0.50</text>
  <text x="42" y="78" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">1.00</text>
  <text x="50" y="389" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">0.00</text>
  <text x="88" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">0</text>
  <text x="256" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">18</text>
  <text x="424" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">36</text>
  <text x="592" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">54</text>
  <text x="760" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">72</text>
  <text x="424" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Tenure months</text>
  <text x="24" y="230" transform="rotate(-90 24 230)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Survival probability</text>
  <polyline fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="88,80 172,86 256,96 340,112 424,132 508,154 592,178 676,205 760,219"/>
  <circle cx="760" cy="219" r="5" fill="#2563eb"/>
  <text x="526" y="210" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Median not reached</text>
  <text x="526" y="230" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Curve stays above 0.5</text>
</svg>
