<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Kaplan-Meier curves by online security</title>
  <desc id="desc">Customers with online security show stronger survival than customers without online security.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Survival Curves by Online Security</text>
  <line x1="88" y1="384" x2="760" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="70" x2="88" y2="384" stroke="#374151" stroke-width="2"/>
  <line x1="88" y1="227" x2="760" y2="227" stroke="#e5e7eb" stroke-dasharray="6 6"/>
  <text x="424" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Tenure months</text>
  <text x="24" y="230" transform="rotate(-90 24 230)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Survival probability</text>
  <polyline fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round" points="88,84 172,108 256,139 340,176 424,216 508,255 592,292 676,325 760,350"/>
  <polyline fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" points="88,80 172,84 256,91 340,101 424,114 508,130 592,148 676,168 760,188"/>
  <polyline fill="none" stroke="#6b7280" stroke-width="4" stroke-linecap="round" points="88,82 172,88 256,99 340,114 424,132 508,152 592,174 676,198 760,222"/>
  <rect x="532" y="82" width="206" height="84" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <line x1="550" y1="106" x2="590" y2="106" stroke="#dc2626" stroke-width="4"/><text x="600" y="111" font-family="Arial, sans-serif" font-size="13" fill="#374151">No</text>
  <line x1="550" y1="132" x2="590" y2="132" stroke="#16a34a" stroke-width="4"/><text x="600" y="137" font-family="Arial, sans-serif" font-size="13" fill="#374151">Yes</text>
  <line x1="550" y1="158" x2="590" y2="158" stroke="#6b7280" stroke-width="4"/><text x="600" y="163" font-family="Arial, sans-serif" font-size="13" fill="#374151">No internet service</text>
</svg>
